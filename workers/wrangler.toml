name = "lunch-vote"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Serves the static frontend on the same origin as the API, so no CORS and no ?api= query.
# Unmatched requests (e.g. /api/*) fall through to the Worker.
[assets]
directory = "../pages"

# Monday 06:00 UTC = weekly fetch; Tue-Fri 06:00 UTC = retry fetch for any source missing today's menu.
[triggers]
crons = ["0 6 * * 1", "0 6 * * 2-5"]

[[d1_databases]]
binding = "DB"
database_name = "lunch_vote"
database_id = "94b66f88-d06b-4167-ba94-fcf2e6a54ac4"
migrations_dir = "migrations"
