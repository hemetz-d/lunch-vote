<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lunch Vote</title>
<meta name="theme-color" content="#5B5FC7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Lunch Vote" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1f2328;
    --muted: #6b7280;
    --accent: #5b5fc7;       /* Teams purple */
    --accent-soft: #e8e9fb;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink);
  }
  header {
    padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; display: flex; align-items: center; gap: 8px; }
  header .date { color: var(--muted); font-size: 14px; }
  .hangry-clock { font-size: 20px; cursor: help; transition: transform 0.3s; display: inline-block; }
  .hangry-clock:hover { transform: scale(1.3); }
  header .preview-note { color: var(--accent); font-size: 13px; font-weight: 500; }
  .who {
    display: flex; align-items: center; gap: 8px; font-size: 14px;
  }
  .who button {
    background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; font-size: inherit;
  }
  main { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; max-width: 1100px; margin: 0 auto; }
  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    header h1 { font-size: 17px; }
    main { padding: 12px; grid-template-columns: 1fr; gap: 10px; }
    section.notes { padding: 0 12px 12px; }
    button.vote { padding: 12px 16px; font-size: 15px; min-height: 44px; }
    footer button.refresh { padding: 8px 14px; font-size: 13px; }
    section.notes input[type="text"] { padding: 10px 12px; font-size: 16px; }
    section.notes button { padding: 10px 16px; }
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px; position: relative;
  }
  .card.voted { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .card.winning { border-color: #e0b84b; box-shadow: 0 0 0 2px rgba(224, 184, 75, 0.25); }
  .card .trophy {
    position: absolute; top: -10px; right: 12px; background: #e0b84b; color: #fff;
    font-size: 12px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
  }
  .card .status {
    font-size: 12px; padding: 4px 8px; border-radius: 6px; align-self: flex-start;
  }
  .card .status.error { background: #fbe9e9; color: #8f2424; }
  .card .status.stale { background: #fdf4d3; color: #8a6a1b; }
  .card h2 { margin: 0; font-size: 16px; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .card h2 .title-row { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .card h2 a.menu-link { font-size: 12px; font-weight: 400; color: var(--muted); text-decoration: none; }
  .card h2 a.menu-link:hover { color: var(--accent); text-decoration: underline; }
  .tally { font-size: 13px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .chef { font-size: 18px; margin: 0 4px; user-select: none; }

  /* Confetti — particles injected into #confetti-root, animated falling with
     random drift, removed after the animation ends. */
  #confetti-root {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 1000;
  }
  .confetti-piece {
    position: absolute; top: -12px; width: 8px; height: 14px; opacity: 0;
    animation: confetti-fall 2s cubic-bezier(0.2, 0.6, 0.3, 1) forwards;
  }
  @keyframes confetti-fall {
    0%   { opacity: 1; transform: translate3d(0, 0, 0) rotate(0deg); }
    100% { opacity: 0; transform: translate3d(var(--dx, 0), 100vh, 0) rotate(720deg); }
  }
  .voters { font-size: 12px; color: var(--muted); line-height: 1.4; }
  ul.options { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; }
  ul.options li { font-size: 14px; line-height: 1.35; }
  ul.options .opt-name { font-weight: 500; }
  ul.options .opt-desc { color: var(--muted); font-size: 13px; }
  ul.options .opt-price { color: var(--muted); font-size: 12px; margin-left: 6px; }
  .empty { color: var(--muted); font-size: 13px; font-style: italic; }
  button.vote {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 12px; font-size: 14px; cursor: pointer; align-self: flex-start;
  }
  button.vote.voted { background: var(--accent-soft); color: var(--accent); }
  button.vote:disabled { opacity: 0.6; cursor: default; }
  section.notes {
    max-width: 1100px; margin: 0 auto; padding: 0 16px 16px;
  }
  section.notes h2 {
    margin: 0 0 8px; font-size: 14px; color: var(--muted); font-weight: 500;
  }
  section.notes .thread {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; display: flex; flex-direction: column; gap: 8px;
  }
  section.notes .note {
    font-size: 13px; line-height: 1.4;
  }
  section.notes .note .meta {
    color: var(--muted); font-size: 12px; margin-right: 6px;
  }
  section.notes .note .author { font-weight: 500; color: var(--ink); }
  section.notes .empty { color: var(--muted); font-size: 13px; font-style: italic; }
  section.notes form {
    display: flex; gap: 8px; margin-top: 4px;
  }
  section.notes input[type="text"] {
    flex: 1; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit;
  }

  section.leaderboard {
    max-width: 1100px; margin: 0 auto; padding: 0 16px 16px;
  }
  section.leaderboard details {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px;
  }
  section.leaderboard summary {
    cursor: pointer; font-size: 14px; color: var(--muted); font-weight: 500;
    list-style: none;
  }
  section.leaderboard summary::-webkit-details-marker { display: none; }
  section.leaderboard summary::before { content: "▸ "; color: var(--muted); }
  section.leaderboard details[open] summary::before { content: "▾ "; }
  section.leaderboard table {
    width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 13px;
  }
  section.leaderboard th, section.leaderboard td {
    text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border);
  }
  section.leaderboard th { color: var(--muted); font-weight: 500; }
  section.leaderboard tr:last-child td { border-bottom: none; }
  section.leaderboard td.right { text-align: right; }
  section.leaderboard .rank { color: var(--muted); width: 24px; }
  .voter-badge { font-size: 11px; margin-left: 2px; }
  section.notes button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 14px; cursor: pointer;
  }
  section.notes button:disabled { opacity: 0.6; cursor: default; }
  .banner {
    max-width: 1100px; margin: 0 auto 4px; padding: 10px 16px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;
    font-size: 13px;
  }
  .banner.nudge { background: var(--accent-soft); color: var(--accent); border-radius: 0; }
  .banner .waiting { color: var(--muted); }

  .decide-bar {
    max-width: 1100px; margin: 0 auto; padding: 0 16px 12px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  button.decide {
    background: linear-gradient(135deg, #ff5e9c, #ff9a3d);
    color: #fff; border: none; border-radius: 10px;
    padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    box-shadow: 0 2px 8px rgba(255, 94, 156, 0.35);
  }
  button.decide:hover:not(:disabled) { transform: translateY(-1px); }
  button.decide:disabled { opacity: 0.5; cursor: default; background: var(--muted); box-shadow: none; }
  button.tiebreaker {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button.protest {
    background: var(--card); color: var(--ink); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer;
  }
  button.protest.active {
    background: #fbe9e9; color: #8f2424; border-color: #c75454;
  }
  .protest-voters {
    font-size: 12px; color: var(--muted); line-height: 1.4;
    flex-basis: 100%; margin-top: -2px;
  }
  .decide-note { color: var(--muted); font-size: 12px; margin-left: 4px; }

  /* Overlay used for the roulette + tie-breaker + shame modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay[hidden] { display: none; }
  .overlay .box {
    background: var(--card); color: var(--ink); border-radius: 14px;
    padding: 24px; max-width: 420px; width: 100%;
    display: flex; flex-direction: column; gap: 12px; text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }
  .overlay h2 { margin: 0; font-size: 16px; color: var(--muted); font-weight: 500; }
  .overlay .big {
    font-size: 28px; font-weight: 700; min-height: 1.3em;
    transition: transform 0.1s;
  }
  .overlay .big.landed { font-size: 32px; color: var(--accent); }
  .overlay .actions { display: flex; gap: 8px; justify-content: center; margin-top: 6px; }
  .overlay .actions button {
    padding: 8px 14px; font-size: 14px; border-radius: 8px; border: none; cursor: pointer;
  }
  .overlay .actions button.primary { background: var(--accent); color: #fff; }
  .overlay .actions button.secondary { background: var(--accent-soft); color: var(--accent); }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; }
  footer button.refresh {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  footer button.refresh:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  footer button.refresh:disabled { opacity: 0.6; cursor: default; }
  #name-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  #name-modal[hidden] { display: none; }
  #name-modal .box {
    background: var(--card); border-radius: 12px; padding: 20px; max-width: 320px; width: 100%;
    display: flex; flex-direction: column; gap: 12px;
  }
  #name-modal h2 { margin: 0; font-size: 16px; }
  #name-modal input { font-size: 16px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; }
  #name-modal button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🍝 Lunch Vote <span class="hangry-clock" id="hangry" title="Hangry meter — updates through the day">🙂</span></h1>
    <div class="date" id="date"></div>
  </div>
  <div class="who">
    <span id="who"></span>
    <button id="change-name">change</button>
  </div>
</header>
<div id="banner" class="banner" hidden></div>
<div class="decide-bar">
  <button id="decide-btn" class="decide">🎲 Decide for me</button>
  <button id="tiebreaker-btn" class="tiebreaker" hidden>🎰 Break the tie</button>
  <button id="protest-btn" class="protest" title="I don't want any of these today">🪧 None of these</button>
  <span class="decide-note" id="decide-note" hidden></span>
  <div id="protest-voters" class="protest-voters" hidden></div>
</div>
<main id="main"></main>
<section class="notes">
  <h2>Notes for today</h2>
  <div class="thread">
    <div id="notes-list"></div>
    <form id="note-form">
      <input id="note-input" type="text" maxlength="200" placeholder="e.g. we're leaving at 12:30" autocomplete="off" />
      <button type="submit" id="note-submit">Post</button>
    </form>
  </div>
</section>
<section class="leaderboard">
  <details>
    <summary id="leaderboard-summary">Leaderboard (last 7 days)</summary>
    <div id="leaderboard-body"></div>
  </details>
</section>
<footer>
  <span id="footer-status">Loading…</span>
  <button class="refresh" id="refresh-btn">Refresh menus</button>
</footer>

<div id="confetti-root"></div>

<div id="roulette-overlay" class="overlay" hidden>
  <div class="box">
    <h2 id="roulette-title">Rolling the dice…</h2>
    <div id="roulette-display" class="big">?</div>
  </div>
</div>

<div id="shame-modal" class="overlay" hidden>
  <div class="box">
    <h2>Really?</h2>
    <div id="shame-body" class="big" style="font-size: 18px; font-weight: 500; line-height: 1.4;"></div>
    <div class="actions">
      <button id="shame-cancel" class="secondary">Never mind</button>
      <button id="shame-confirm" class="primary">Fine, I'm sure</button>
    </div>
  </div>
</div>

<div id="name-modal" hidden>
  <div class="box">
    <h2>What's your name?</h2>
    <input id="name-input" type="text" placeholder="Jane from Marketing" autocomplete="off" />
    <button id="name-save">Continue</button>
  </div>
</div>

<script src="/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
