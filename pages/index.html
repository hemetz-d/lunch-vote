<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lunch Vote</title>
<meta name="theme-color" content="#5B5FC7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Lunch Vote" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
<script>
  // Apply the saved theme before the stylesheet renders, to avoid a flash
  // of the default palette on every page load.
  try {
    const t = localStorage.getItem("lunch-vote-theme");
    if (t && t !== "default") document.documentElement.dataset.theme = t;
  } catch {}
</script>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1f2328;
    --muted: #6b7280;
    --accent: #5b5fc7;       /* Teams purple */
    --accent-soft: #e8e9fb;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink);
  }
  header {
    padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; }
  header .date { color: var(--muted); font-size: 14px; }
  header .preview-note { color: var(--accent); font-size: 13px; font-weight: 500; }
  .who {
    display: flex; align-items: center; gap: 8px; font-size: 14px;
  }
  .who button {
    background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; font-size: inherit;
  }
  main { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; max-width: 1100px; margin: 0 auto; }
  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    header h1 { font-size: 17px; }
    main { padding: 12px; grid-template-columns: 1fr; gap: 10px; }
    section.notes { padding: 0 12px 12px; }
    button.vote { padding: 12px 16px; font-size: 15px; min-height: 44px; }
    footer button.refresh { padding: 8px 14px; font-size: 13px; }
    section.notes input[type="text"] { padding: 10px 12px; font-size: 16px; }
    section.notes button { padding: 10px 16px; }
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px; position: relative;
  }
  .card.voted { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .card.winning { border-color: #e0b84b; box-shadow: 0 0 0 2px rgba(224, 184, 75, 0.25); }
  .card .trophy {
    position: absolute; top: -10px; right: 12px; background: #e0b84b; color: #fff;
    font-size: 12px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
  }
  .card .status {
    font-size: 12px; padding: 4px 8px; border-radius: 6px; align-self: flex-start;
  }
  .card .status.error { background: #fbe9e9; color: #8f2424; }
  .card .status.stale { background: #fdf4d3; color: #8a6a1b; }
  .card h2 { margin: 0; font-size: 16px; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .card h2 .title-row { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .card h2 a.menu-link { font-size: 12px; font-weight: 400; color: var(--muted); text-decoration: none; }
  .card h2 a.menu-link:hover { color: var(--accent); text-decoration: underline; }
  .tally { font-size: 13px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .voters { font-size: 12px; color: var(--muted); line-height: 1.4; }
  ul.options { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; }
  ul.options li { font-size: 14px; line-height: 1.35; }
  ul.options .opt-name { font-weight: 500; }
  ul.options .opt-desc { color: var(--muted); font-size: 13px; }
  ul.options .opt-price { color: var(--muted); font-size: 12px; margin-left: 6px; }
  .empty { color: var(--muted); font-size: 13px; font-style: italic; }
  button.vote {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 12px; font-size: 14px; cursor: pointer; align-self: flex-start;
  }
  button.vote.voted { background: var(--accent-soft); color: var(--accent); }
  button.vote:disabled { opacity: 0.6; cursor: default; }
  section.notes {
    max-width: 1100px; margin: 0 auto; padding: 0 16px 16px;
  }
  section.notes h2 {
    margin: 0 0 8px; font-size: 14px; color: var(--muted); font-weight: 500;
  }
  section.notes .thread {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; display: flex; flex-direction: column; gap: 8px;
  }
  section.notes .note {
    font-size: 13px; line-height: 1.4;
  }
  section.notes .note .meta {
    color: var(--muted); font-size: 12px; margin-right: 6px;
  }
  section.notes .note .author { font-weight: 500; color: var(--ink); }
  section.notes .empty { color: var(--muted); font-size: 13px; font-style: italic; }
  section.notes form {
    display: flex; gap: 8px; margin-top: 4px;
  }
  section.notes input[type="text"] {
    flex: 1; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit;
  }
  section.notes button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 14px; cursor: pointer;
  }
  section.notes button:disabled { opacity: 0.6; cursor: default; }
  .banner {
    max-width: 1100px; margin: 0 auto 4px; padding: 10px 16px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;
    font-size: 13px;
  }
  .banner.nudge { background: var(--accent-soft); color: var(--accent); border-radius: 0; }
  .banner .waiting { color: var(--muted); }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; }
  footer button.refresh {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  footer button.refresh:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  footer button.refresh:disabled { opacity: 0.6; cursor: default; }
  #theme-select {
    font-size: 13px; padding: 4px 6px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--card); color: var(--ink);
    font-family: inherit; cursor: pointer;
  }

  /* ============= THEME: Midnight Diner ============= */
  html[data-theme="midnight"] {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --ink: #e8e9fb;
    --muted: #8a8b9e;
    --accent: #ff5e9c;
    --accent-soft: #2a1a3a;
    --border: #2f2f4a;
  }
  html[data-theme="midnight"] header { border-bottom-color: #2f2f4a; }
  html[data-theme="midnight"] .card.voted { box-shadow: 0 0 14px rgba(255, 94, 156, 0.35); }
  html[data-theme="midnight"] .card.winning {
    border-color: #ffd93d;
    box-shadow: 0 0 16px rgba(255, 217, 61, 0.4);
  }
  html[data-theme="midnight"] .card.winning .trophy { background: #ffd93d; color: #1a1a2e; }
  html[data-theme="midnight"] button.vote { box-shadow: 0 0 10px rgba(255, 94, 156, 0.5); }
  html[data-theme="midnight"] .banner.nudge { background: #2a1a3a; color: #ff5e9c; }
  html[data-theme="midnight"] header h1 { text-shadow: 0 0 8px rgba(255, 94, 156, 0.4); }
  html[data-theme="midnight"] section.notes input[type="text"],
  html[data-theme="midnight"] #name-modal input {
    background: var(--bg); color: var(--ink);
  }

  /* ============= THEME: Retro Terminal ============= */
  html[data-theme="terminal"] {
    --bg: #000;
    --card: #0a0a0a;
    --ink: #00ff41;
    --muted: #009925;
    --accent: #00ff41;
    --accent-soft: rgba(0, 255, 65, 0.1);
    --border: #00ff41;
  }
  html[data-theme="terminal"] body { font-family: "Consolas", "Courier New", monospace; }
  html[data-theme="terminal"] header, html[data-theme="terminal"] .card,
  html[data-theme="terminal"] section.notes .thread,
  html[data-theme="terminal"] #theme-select,
  html[data-theme="terminal"] button.vote,
  html[data-theme="terminal"] section.notes input[type="text"],
  html[data-theme="terminal"] section.notes button,
  html[data-theme="terminal"] footer button.refresh,
  html[data-theme="terminal"] #name-modal .box,
  html[data-theme="terminal"] #name-modal input,
  html[data-theme="terminal"] #name-modal button {
    border-radius: 0;
  }
  html[data-theme="terminal"] .card {
    border-style: dashed; border-width: 1px; box-shadow: none;
  }
  html[data-theme="terminal"] .card.voted,
  html[data-theme="terminal"] .card.winning { border-style: solid; }
  html[data-theme="terminal"] .card.winning { border-color: #ffff41; }
  html[data-theme="terminal"] .card.winning .trophy { background: #ffff41; color: #000; }
  html[data-theme="terminal"] header h1::before { content: "> "; }
  html[data-theme="terminal"] button.vote {
    background: #00ff41; color: #000; font-family: inherit; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
  }
  html[data-theme="terminal"] button.vote.voted { background: var(--accent-soft); color: #00ff41; }
  html[data-theme="terminal"] section.notes input[type="text"],
  html[data-theme="terminal"] #name-modal input {
    background: #000; color: #00ff41; font-family: inherit;
  }
  html[data-theme="terminal"] section.notes button,
  html[data-theme="terminal"] #name-modal button {
    background: #00ff41; color: #000; font-family: inherit; text-transform: uppercase;
  }
  html[data-theme="terminal"] footer button.refresh {
    font-family: inherit; border-color: #00ff41;
  }
  html[data-theme="terminal"] .banner.nudge { background: rgba(0, 255, 65, 0.12); color: #00ff41; }

  /* ============= THEME: 90s Geocities ============= */
  html[data-theme="geocities"] {
    --bg: #000014;
    --card: #ffff00;
    --ink: #000;
    --muted: #333;
    --accent: #ff00ff;
    --accent-soft: #ffb8ff;
    --border: #00ffff;
  }
  html[data-theme="geocities"] body {
    font-family: "Comic Sans MS", "Chalkboard", cursive;
    background-image:
      radial-gradient(circle at 20% 30%, #fff 0, transparent 1.5px),
      radial-gradient(circle at 80% 70%, #fff 0, transparent 1.5px),
      radial-gradient(circle at 40% 90%, #fff 0, transparent 1.5px),
      radial-gradient(circle at 60% 10%, #fff 0, transparent 1.5px),
      radial-gradient(circle at 10% 80%, #fff 0, transparent 1.5px);
    background-size: 100px 100px, 120px 120px, 80px 80px, 90px 90px, 110px 110px;
    color: #fff;
  }
  html[data-theme="geocities"] header {
    background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
    background-size: 400% 100%;
    animation: gc-rainbow 4s linear infinite;
    color: #000; border-bottom: 3px solid #fff;
  }
  @keyframes gc-rainbow { 0% { background-position: 0% 0; } 100% { background-position: 400% 0; } }
  html[data-theme="geocities"] header h1 {
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 #000; font-weight: 900;
  }
  html[data-theme="geocities"] header .date { color: #000; font-weight: 600; }
  html[data-theme="geocities"] .card {
    border: 3px solid var(--border); border-radius: 0;
    box-shadow: 6px 6px 0 #ff00ff;
    color: #000;
  }
  html[data-theme="geocities"] .card .tally { color: #000; }
  html[data-theme="geocities"] .card.winning {
    border-color: #ffff00;
    box-shadow: 6px 6px 0 #00ff00, 0 0 24px #ffff00;
  }
  html[data-theme="geocities"] .card.winning .trophy { background: #ff00ff; color: #fff; }
  html[data-theme="geocities"] .tally { animation: gc-blink 1s steps(2) infinite; }
  @keyframes gc-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.3; } }
  html[data-theme="geocities"] button.vote {
    background: linear-gradient(180deg, #ff6ed8, #ff00ff);
    border: 3px outset #ffb8ff; border-radius: 0;
    color: #fff; text-transform: uppercase; font-weight: 900;
    text-shadow: 1px 1px 0 #000;
  }
  html[data-theme="geocities"] button.vote:active { border-style: inset; }
  html[data-theme="geocities"] section.notes h2,
  html[data-theme="geocities"] .banner { color: #fff; }
  html[data-theme="geocities"] section.notes .thread {
    background: #00ffff; border: 3px solid #ff00ff; color: #000;
  }
  html[data-theme="geocities"] section.notes .note,
  html[data-theme="geocities"] section.notes .note .author,
  html[data-theme="geocities"] section.notes .empty { color: #000; }
  html[data-theme="geocities"] footer { color: #fff; }
  html[data-theme="geocities"] footer button.refresh {
    background: #ff00ff; color: #fff; border: 2px outset #ffb8ff;
    border-radius: 0; font-weight: 700;
  }
  html[data-theme="geocities"] #theme-select {
    background: #ffff00; color: #000; border: 2px solid #ff00ff; border-radius: 0;
    font-weight: 700;
  }

  #name-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  #name-modal[hidden] { display: none; }
  #name-modal .box {
    background: var(--card); border-radius: 12px; padding: 20px; max-width: 320px; width: 100%;
    display: flex; flex-direction: column; gap: 12px;
  }
  #name-modal h2 { margin: 0; font-size: 16px; }
  #name-modal input { font-size: 16px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; }
  #name-modal button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🍝 Lunch Vote</h1>
    <div class="date" id="date"></div>
  </div>
  <div class="who">
    <span id="who"></span>
    <button id="change-name">change</button>
    <select id="theme-select" aria-label="Theme">
      <option value="default">Default</option>
      <option value="midnight">🌃 Midnight Diner</option>
      <option value="terminal">💾 Retro Terminal</option>
      <option value="geocities">✨ 90s Geocities</option>
    </select>
  </div>
</header>
<div id="banner" class="banner" hidden></div>
<main id="main"></main>
<section class="notes">
  <h2>Notes for today</h2>
  <div class="thread">
    <div id="notes-list"></div>
    <form id="note-form">
      <input id="note-input" type="text" maxlength="200" placeholder="e.g. we're leaving at 12:30" autocomplete="off" />
      <button type="submit" id="note-submit">Post</button>
    </form>
  </div>
</section>
<footer>
  <span id="footer-status">Loading…</span>
  <button class="refresh" id="refresh-btn">Refresh menus</button>
</footer>

<div id="name-modal" hidden>
  <div class="box">
    <h2>What's your name?</h2>
    <input id="name-input" type="text" placeholder="Jane from Marketing" autocomplete="off" />
    <button id="name-save">Continue</button>
  </div>
</div>

<script src="/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
